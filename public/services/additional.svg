<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-add" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf5e8"/>
      <stop offset="1" stop-color="#f3e8f7"/>
    </linearGradient>
    <linearGradient id="grad-add-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#7b2d8e"/>
    </linearGradient>
    <linearGradient id="grad-add-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b2d8e"/>
      <stop offset="1" stop-color="#1a3a6b"/>
    </linearGradient>
    <radialGradient id="glow-add" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg-add)"/>
  <circle cx="400" cy="250" r="240" fill="url(#glow-add)"/>

  <!-- Microscope (center) -->
  <g transform="translate(400 250)">
    <!-- Base -->
    <rect x="-90" y="100" width="180" height="20" rx="4" fill="url(#grad-add-2)"/>
    <!-- Stage -->
    <rect x="-60" y="70" width="120" height="30" rx="3" fill="url(#grad-add-1)" opacity="0.85"/>
    <!-- Arm -->
    <path d="M -40 70 L -40 -40 Q -40 -70 -10 -70 L 30 -70" fill="none" stroke="url(#grad-add-2)" stroke-width="14" stroke-linecap="round"/>
    <!-- Eyepiece -->
    <rect x="20" y="-100" width="30" height="40" rx="6" fill="url(#grad-add-2)"/>
    <!-- Lens -->
    <circle cx="35" cy="-30" r="20" fill="url(#grad-add-1)" opacity="0.85"/>
    <circle cx="35" cy="-30" r="8" fill="#ffffff" opacity="0.3"/>
    <!-- Slide -->
    <rect x="-30" y="78" width="60" height="6" fill="#ffffff" opacity="0.7"/>
    <circle cx="-10" cy="81" r="4" fill="#0099cc" opacity="0.6"/>
    <circle cx="10" cy="81" r="3" fill="#7b2d8e" opacity="0.6"/>
  </g>

  <!-- Test tubes on left -->
  <g transform="translate(140 290)" opacity="0.85">
    <g transform="translate(-25 0)">
      <rect x="-12" y="-90" width="24" height="100" rx="12" fill="none" stroke="url(#grad-add-2)" stroke-width="3"/>
      <rect x="-12" y="-30" width="24" height="40" rx="0" fill="url(#grad-add-1)" opacity="0.7"/>
    </g>
    <g transform="translate(15 0)">
      <rect x="-12" y="-110" width="24" height="120" rx="12" fill="none" stroke="url(#grad-add-2)" stroke-width="3"/>
      <rect x="-12" y="-50" width="24" height="60" rx="0" fill="url(#grad-add-2)" opacity="0.6"/>
    </g>
  </g>

  <!-- DNA strand on right -->
  <g transform="translate(640 280)" opacity="0.7">
    <g stroke="url(#grad-add-1)" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M -30 -90 Q 0 -67 30 -90"/>
      <path d="M -30 -50 Q 0 -27 30 -50"/>
      <path d="M -30 -10 Q 0 13 30 -10"/>
      <path d="M -30 30 Q 0 53 30 30"/>
      <path d="M -30 70 Q 0 93 30 70"/>
      <path d="M 30 -90 Q 0 -67 -30 -90"/>
      <path d="M 30 -50 Q 0 -27 -30 -50"/>
      <path d="M 30 -10 Q 0 13 -30 -10"/>
      <path d="M 30 30 Q 0 53 -30 30"/>
      <path d="M 30 70 Q 0 93 -30 70"/>
    </g>
    <g fill="url(#grad-add-2)">
      <circle cx="-30" cy="-90" r="4"/><circle cx="30" cy="-90" r="4"/>
      <circle cx="-30" cy="-50" r="4"/><circle cx="30" cy="-50" r="4"/>
      <circle cx="-30" cy="-10" r="4"/><circle cx="30" cy="-10" r="4"/>
      <circle cx="-30" cy="30" r="4"/><circle cx="30" cy="30" r="4"/>
      <circle cx="-30" cy="70" r="4"/><circle cx="30" cy="70" r="4"/>
    </g>
  </g>

  <!-- Particle accents -->
  <g fill="#c9a84c" opacity="0.5">
    <circle cx="120" cy="80" r="4"/>
    <circle cx="700" cy="100" r="5"/>
    <circle cx="380" cy="50" r="4"/>
  </g>
  <g fill="#7b2d8e" opacity="0.4">
    <circle cx="730" cy="380" r="3"/>
    <circle cx="80" cy="180" r="3"/>
    <circle cx="280" cy="430" r="4"/>
  </g>
</svg>
