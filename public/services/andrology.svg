<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg-and" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3e8f7"/>
      <stop offset="1" stop-color="#e8eef6"/>
    </linearGradient>
    <linearGradient id="grad-and-1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b2d8e"/>
      <stop offset="1" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="grad-and-2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0099cc"/>
      <stop offset="1" stop-color="#7b2d8e"/>
    </linearGradient>
    <radialGradient id="glow-and" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg-and)"/>
  <!-- Soft glow center -->
  <circle cx="400" cy="250" r="240" fill="url(#glow-and)"/>

  <!-- DNA helix on left -->
  <g transform="translate(180 250)" opacity="0.7">
    <g stroke="url(#grad-and-1)" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M -50 -100 Q 0 -75 50 -100"/>
      <path d="M -50 -50 Q 0 -25 50 -50"/>
      <path d="M -50 0 Q 0 25 50 0"/>
      <path d="M -50 50 Q 0 75 50 50"/>
      <path d="M -50 100 Q 0 125 50 100"/>
      <path d="M 50 -100 Q 0 -75 -50 -100"/>
      <path d="M 50 -50 Q 0 -25 -50 -50"/>
      <path d="M 50 0 Q 0 25 -50 0"/>
      <path d="M 50 50 Q 0 75 -50 50"/>
      <path d="M 50 100 Q 0 125 -50 100"/>
    </g>
    <g stroke="url(#grad-and-1)" stroke-width="3" fill="url(#grad-and-1)" opacity="0.9">
      <circle cx="-50" cy="-100" r="6"/>
      <circle cx="50" cy="-100" r="6"/>
      <circle cx="-50" cy="-50" r="6"/>
      <circle cx="50" cy="-50" r="6"/>
      <circle cx="-50" cy="0" r="6"/>
      <circle cx="50" cy="0" r="6"/>
      <circle cx="-50" cy="50" r="6"/>
      <circle cx="50" cy="50" r="6"/>
      <circle cx="-50" cy="100" r="6"/>
      <circle cx="50" cy="100" r="6"/>
    </g>
  </g>

  <!-- Male symbol on right -->
  <g transform="translate(560 230)">
    <circle cx="0" cy="40" r="80" fill="none" stroke="url(#grad-and-2)" stroke-width="14"/>
    <line x1="55" y1="-15" x2="120" y2="-80" stroke="url(#grad-and-2)" stroke-width="14" stroke-linecap="round"/>
    <polyline points="80,-80 120,-80 120,-40" fill="none" stroke="url(#grad-and-2)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Inner pulse -->
    <circle cx="0" cy="40" r="40" fill="url(#grad-and-2)" opacity="0.18"/>
    <circle cx="0" cy="40" r="20" fill="url(#grad-and-2)" opacity="0.3"/>
  </g>

  <!-- Particle accents -->
  <g fill="#7b2d8e" opacity="0.4">
    <circle cx="120" cy="100" r="4"/>
    <circle cx="700" cy="120" r="5"/>
    <circle cx="660" cy="420" r="3"/>
    <circle cx="80" cy="380" r="4"/>
    <circle cx="260" cy="60" r="3"/>
  </g>
  <g fill="#0099cc" opacity="0.4">
    <circle cx="730" cy="280" r="3"/>
    <circle cx="100" cy="200" r="3"/>
    <circle cx="380" cy="40" r="4"/>
  </g>
</svg>
