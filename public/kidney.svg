<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0099cc" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#1a3a6b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1a3a6b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kidney" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b2d8e"/>
      <stop offset="0.5" stop-color="#0099cc"/>
      <stop offset="1" stop-color="#1a3a6b"/>
